<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    h2 {
      margin-top: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .grid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    button {
      padding: 10px 15px;
      margin: 10px 5px;
      cursor: pointer;
    }

    #slideshow {
      margin-top: 30px;
      text-align: center;
    }

    #slideshow img {
      max-width: 600px;
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>📸 Dashboard Mariage</h1>

<button onclick="downloadAll()">⬇️ Télécharger toutes les photos</button>

<div id="categories"></div>

<div id="slideshow">
  <h2>🎞️ Diaporama</h2>
  <img id="slideImage" src="" />
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
import JSZip from "https://cdn.jsdelivr.net/npm/jszip/+esm"

const supabase = createClient(
  "https://TON-PROJET.supabase.co",
  "TON-ANON-KEY"
)

let allPhotos = []
let currentSlide = 0

async function loadPhotos() {
  const { data } = await supabase
    .from("photos")
    .select("*")

  allPhotos = data

  displayCategories()
  startSlideshow()
}

function displayCategories() {
  const container = document.getElementById("categories")
  container.innerHTML = ""

  const categories = {}

  allPhotos.forEach(p => {
    if (!categories[p.event_id]) categories[p.event_id] = []
    categories[p.event_id].push(p)
  })

  for (let cat in categories) {
    const div = document.createElement("div")

    div.innerHTML = `
      <h2>${cat}</h2>
      <button onclick="downloadCategory('${cat}')">
        Télécharger ${cat}
      </button>
      <div class="grid">
        ${categories[cat].map(p => `
          <img src="${p.image_url}" />
        `).join("")}
      </div>
    `

    container.appendChild(div)
  }
}

window.downloadAll = async function () {
  const zip = new JSZip()

  for (let photo of allPhotos) {
    const response = await fetch(photo.image_url)
    const blob = await response.blob()
    zip.file(photo.id + ".jpg", blob)
  }

  const content = await zip.generateAsync({ type: "blob" })
  const link = document.createElement("a")
  link.href = URL.createObjectURL(content)
  link.download = "all-photos.zip"
  link.click()
}

window.downloadCategory = async function (category) {
  const zip = new JSZip()

  const photos = allPhotos.filter(p => p.event_id === category)

  for (let photo of photos) {
    const response = await fetch(photo.image_url)
    const blob = await response.blob()
    zip.file(photo.id + ".jpg", blob)
  }

  const content = await zip.generateAsync({ type: "blob" })
  const link = document.createElement("a")
  link.href = URL.createObjectURL(content)
  link.download = category + ".zip"
  link.click()
}

function startSlideshow() {
  if (allPhotos.length === 0) return

  setInterval(() => {
    const img = document.getElementById("slideImage")
    img.src = allPhotos[currentSlide].image_url

    currentSlide = (currentSlide + 1) % allPhotos.length
  }, 2000)
}

loadPhotos()

</script>

</body>
</html>
